apiVersion: batch/v1
kind: Job
metadata:
  name: nmoe-debug
  labels:
    app: nmoe
    stage: debug
spec:
  template:
    metadata:
      labels:
        app: nmoe
        stage: debug
    spec:
      restartPolicy: Never
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          value: "true"
          effect: NoSchedule
      containers:
        - name: nmoe
          image: xjdr/nmoe_debug:latest
          imagePullPolicy: Always
          command: ["/bin/bash"]
          args:
            - -c
            - |
              cd /workspace/nmoe
              echo "=== nmoe Debug Container Ready ==="
              echo "Node: $(hostname)"
              echo "Privileged: true (ncu/nsys enabled)"
              echo "Network: host"
              echo "Use 'kubectl exec -it <pod-name> -- bash' to access"
              echo ""
              # Loop indefinitely
              while true; do sleep 3600; done
          env:
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "expandable_segments:True"
            - name: PYTHONPATH
              value: "/workspace/nmoe:/workspace/nmoe/nmoe/csrc:/workspace/nmoe/third_party/flash_attn:/workspace/nmoe/third_party/quack:/workspace/nmoe/triton/python"
            - name: NMOE_FLASH_ATTN_PATH
              value: "/workspace/nmoe/third_party/flash_attn"
            - name: NMOE_QUACK_PATH
              value: "/workspace/nmoe/third_party/quack"
            - name: NMOE_TRITON_PYTHON_PATH
              value: "/workspace/nmoe/triton/python"
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_PTRACE
          volumeMounts:
            - name: data
              mountPath: /data
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              nvidia.com/gpu: 8
            limits:
              nvidia.com/gpu: 8
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nmoe-data
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 32Gi
